<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الأشخاص</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Tahoma, Arial, sans-serif;
      background: #ecebea;
      color: #1d1d1d;
      line-height: 1.6;
    }

    body::before {
      content: "";
      display: block;
      height: 150px;
      background: #202124;
      border-bottom: 6px solid #b8a46f;
    }

    main {
      width: min(980px, calc(100% - 28px));
      margin: -92px auto 44px;
      background: #ffffff;
      border: 1px solid #d8d5cf;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0;
      padding: 24px 28px;
      background: #ffffff;
      border-bottom: 1px solid #e4e1dc;
      font-size: 25px;
      font-weight: 700;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      padding: 24px 28px;
      background: #f8f7f5;
      border-bottom: 1px solid #e4e1dc;
    }

    form div {
      display: grid;
      gap: 7px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: #4c4a46;
    }

    input {
      width: 100%;
      min-height: 42px;
      padding: 9px 11px;
      border: 0;
      border-bottom: 2px solid #8f887d;
      background: #ffffff;
      color: #111;
      font: inherit;
    }

    input:focus {
      outline: 0;
      border-bottom-color: #202124;
      background: #fffdf8;
    }

    form button {
      grid-column: 1 / -1;
      justify-self: start;
      min-width: 150px;
    }

    button {
      min-height: 40px;
      padding: 8px 18px;
      border: 1px solid #202124;
      background: #202124;
      color: #ffffff;
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: #3a3b3f;
    }

    button.secondary {
      min-height: 34px;
      padding: 6px 14px;
      background: #ffffff;
      color: #202124;
      border-color: #b8a46f;
    }

    button.secondary:hover {
      background: #f3eddf;
    }

    #message {
      min-height: 24px;
      margin: 0;
      padding: 14px 28px 0;
      color: #5f5130;
      font-size: 14px;
    }

    table {
      width: calc(100% - 56px);
      margin: 14px 28px 28px;
      border-collapse: separate;
      border-spacing: 0;
      background: #ffffff;
      font-size: 15px;
      border: 1px solid #dedbd6;
    }

    thead {
      background: #202124;
      color: #ffffff;
    }

    th,
    td {
      padding: 13px 14px;
      text-align: right;
      vertical-align: middle;
      border-bottom: 1px solid #e8e5df;
    }

    th {
      font-weight: 700;
      font-size: 14px;
    }

    tbody tr:nth-child(even) {
      background: #faf9f7;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    td[data-status="0"] {
      color: #777;
      font-weight: 700;
    }

    td[data-status="1"] {
      color: #1f6b44;
      font-weight: 700;
    }

    @media (max-width: 720px) {
      body::before {
        height: 96px;
      }

      main {
        width: 100%;
        margin: -42px 0 0;
        border-left: 0;
        border-right: 0;
        box-shadow: none;
      }

      h1,
      form,
      #message {
        padding-left: 16px;
        padding-right: 16px;
      }

      form {
        grid-template-columns: 1fr;
      }

      table {
        width: calc(100% - 32px);
        margin: 14px 16px 22px;
        font-size: 13px;
      }

      th,
      td {
        padding: 10px 8px;
      }

      button.secondary {
        padding: 6px 10px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>إدارة الأشخاص</h1>

    <form id="personForm">
      <div>
        <label for="name">الاسم</label>
        <input id="name" name="name" type="text" required>
      </div>

      <div>
        <label for="age">العمر</label>
        <input id="age" name="age" type="number" min="1" required>
      </div>

      <button type="submit">إرسال</button>
    </form>

    <p id="message"></p>

    <table>
      <thead>
        <tr>
          <th>الاسم</th>
          <th>العمر</th>
          <th>الحالة</th>
          <th>تبديل</th>
        </tr>
      </thead>
      <tbody id="peopleBody">
        <tr>
          <td colspan="4">جاري التحميل...</td>
        </tr>
      </tbody>
    </table>
  </main>

  <script>
    const form = document.getElementById('personForm');
    const nameInput = document.getElementById('name');
    const ageInput = document.getElementById('age');
    const peopleBody = document.getElementById('peopleBody');
    const message = document.getElementById('message');

    async function request(action, data = {}) {
      const response = await fetch('api.php?action=' + action, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (!response.ok || !result.success) {
        throw new Error(result.message || 'حدث خطأ');
      }

      return result;
    }

    async function loadPeople() {
      try {
        const response = await fetch('api.php?action=list');
        const result = await response.json();

        if (!result.success) {
          throw new Error(result.message || 'حدث خطأ');
        }

        renderPeople(result.people);
      } catch (error) {
        peopleBody.innerHTML = '<tr><td colspan="4">تعذر تحميل البيانات</td></tr>';
        message.textContent = error.message;
      }
    }

    function renderPeople(people) {
      if (!people.length) {
        peopleBody.innerHTML = '<tr><td colspan="4">لا توجد بيانات</td></tr>';
        return;
      }

      peopleBody.innerHTML = '';

      people.forEach((person) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${escapeHtml(person.name)}</td>
          <td>${person.age}</td>
          <td data-status="${person.id}">${person.status}</td>
          <td><button class="secondary" type="button" data-id="${person.id}">Toggle</button></td>
        `;
        peopleBody.appendChild(row);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';

      const name = nameInput.value.trim();
      const age = ageInput.value;

      try {
        await request('add', { name, age });
        form.reset();
        await loadPeople();
        message.textContent = 'تم حفظ البيانات';
      } catch (error) {
        message.textContent = error.message;
      }
    });

    peopleBody.addEventListener('click', async (event) => {
      if (!event.target.matches('button[data-id]')) {
        return;
      }

      const id = event.target.dataset.id;
      message.textContent = '';

      try {
        const result = await request('toggle', { id });
        const statusCell = document.querySelector(`[data-status="${id}"]`);
        statusCell.textContent = result.status;
      } catch (error) {
        message.textContent = error.message;
      }
    });

    loadPeople();
  </script>
</body>
</html>
